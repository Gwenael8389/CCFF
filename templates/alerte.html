{% extends "base.html" %}
{% block title %}Gestion Alerte | CCFF{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-red-50 rounded-3xl p-8 border-4 border-red-500 shadow-2xl">
        <h1 class="text-3xl font-black text-red-700 mb-2 flex items-center gap-3">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 21h22M12 6l7.53 13H4.47M11 10v4h2v-4m-2 6v2h2v-2"/></svg>
            Console d'Urgence
        </h1>
        <p class="text-red-900 font-bold mb-8">Attention: Cette action affichera un bandeau rouge chez tous les bénévoles et leur enverra un email instantanément.</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-black text-red-900 mb-2 uppercase">Type d'événement (Titre)</label>
                <input type="text" name="titre" placeholder="Ex: DEPART DE FEU MASSIF SUD" required class="w-full bg-white border-2 border-red-200 text-red-900 font-bold rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-500">
            </div>

            <div>
                <label class="block text-sm font-black text-red-900 mb-2 uppercase">Instructions (Message)</label>
                <textarea name="message" rows="4" placeholder="Ex: Patrouille 1 rendez-vous citerne 4. Équipe de réserve mobilisée en mairie." required class="w-full bg-white border-2 border-red-200 text-red-900 rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-500"></textarea>
            </div>

            <div class="flex gap-4">
                <button type="submit" name="action" value="lancer" class="flex-1 bg-red-600 text-white font-black py-4 rounded-xl hover:bg-red-700 transition shadow-lg text-lg animate-pulse-slow">
                    LANCER L'ALERTE
                </button>
                <button type="submit" name="action" value="stopper" formnovalidate class="bg-slate-900 text-white font-black py-4 px-6 rounded-xl hover:bg-slate-800 transition shadow-lg">
                    STOPPER L'ALERTE
                </button>
            </div>
            <a href="{% url 'intranet' %}" class="block text-center text-red-500 font-bold mt-4 hover:underline">Annuler et revenir</a>
        </form>
    </div>
</div>
{% endblock %}
