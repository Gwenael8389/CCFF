{% extends "base.html" %}
{% block title %}Mot de passe oublié | CCFF{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
        <h1 class="text-2xl font-black text-slate-900 mb-2">Mot de passe oublié ?</h1>
        <p class="text-slate-600 text-sm mb-8">Entrez votre adresse e-mail. Si elle correspond à un compte bénévole, nous vous enverrons un lien de réinitialisation.</p>

        <form method="POST" class="space-y-6 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Votre Email</label>
                {{ form.email }}
            </div>
            <button type="submit" class="w-full bg-brand-500 text-white font-bold text-lg rounded-xl px-4 py-4 hover:bg-brand-600 transition shadow-lg">
                Envoyer le lien
            </button>
        </form>
    </div>
</div>
<script>document.querySelector('input[name="email"]').className = "w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500";</script>
{% endblock %}
