{% extends "base.html" %}
{% block title %}Mot de passe modifié | CCFF{% endblock %}

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
        <div class="w-16 h-16 bg-green-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

        <a href="{% url 'login' %}" class="block w-full bg-slate-900 text-white font-bold text-lg rounded-xl px-4 py-4 hover:bg-brand-600 transition shadow-lg">
            Me connecter
        </a>
    </div>
