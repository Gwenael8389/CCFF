{% extends "base.html" %}
{% block title %}Email envoyé | CCFF{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h1 class="text-2xl font-black text-slate-900 mb-4">Vérifiez votre boîte mail</h1>
        <p class="text-slate-600 mb-8">Si l'adresse saisie existe dans notre base, un email vient de vous être envoyé avec les instructions.</p>
        <a href="{% url 'login' %}" class="text-brand-600 font-bold hover:underline">Retour à la connexion</a>
    </div>
</div>
{% endblock %}
